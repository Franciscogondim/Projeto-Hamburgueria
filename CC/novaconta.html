<body>
   <header class="topo-site">

      <img src="img/logo.png" alt="Logo do site" class="logo">

    <nav class="menu-categorias">

    <div class="container-ajuste">

    <form action="cadastro.html">
      <div class="entre">
      <h1>Criando sua Conta</h1><hr style="position: relative; top: 10px; margin-top: 10px;">
      </div>
            <div>
              <input class="input-login" type="text" placeholder="Nome Completo">

            <div>
             <input class="input-login" type="text" placeholder="Endereço" required>
            </div>
            <div>
              <input class="input-login" type="number" placeholder="Telefone" required>
            </div>
            <div>
              <input class="submit-login" type="submit" value="Criar Conta">
            </div> 
    </form>
    </div>
    </div>
